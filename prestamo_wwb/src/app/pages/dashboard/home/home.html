<nav class="navbar">

  <div>
    {{ usuario.nombre }}
  </div>

  <div class="categorias">

    <button
      *ngFor="let categoria of categorias"
      (click)="seleccionarCategoria(categoria)"
    >
      {{ categoria }}
    </button>

    <button routerLink="/mis-prestamos">
      Mis préstamos
    </button>

  </div>

</nav>

<div
  class="marcas"
  *ngIf="categoriaSeleccionada"
>

  <button
    *ngFor="let marca of marcas"
    (click)="seleccionarMarca(marca)"
  >
    {{ marca }}
  </button>

</div>

<div class="busqueda">

  <input
    [(ngModel)]="busqueda"
    placeholder="Buscar equipo..."
  >

</div>

<div class="equipos">

  <div
    class="card"
    *ngFor="
      let equipo
      of equiposFiltrados
    "
  >

    <img
      [src]="equipo.imagen"
    >

    <h3>
      {{ equipo.nombre }}
    </h3>

    <p>
      {{ equipo.estado }}
    </p>

    <button
      (click)="abrirModal(equipo)"
    >
      Pedir préstamo
    </button>

  </div>

</div>

<div
  *ngIf="modalAbierto"
  class="modal"
>

  <div class="modal-card">

    <h2>
      Solicitar préstamo
    </h2>

    <input
      [(ngModel)]="
      nombrePersona"
      placeholder="Nombre"
    >

    <input
      [(ngModel)]="cargo"
      placeholder="Cargo"
    >

    <label>
      Fecha inicio
    </label>

    <input
      type="date"
      [min]="fechaMinima"
      [(ngModel)]="
      fechaInicio"
    >

    <label>
      Fecha fin
    </label>

    <input
      type="date"
      [min]="fechaInicio"
      [(ngModel)]="
      fechaFin"
    >

    <button
      (click)="
      solicitarPrestamo()
      "
    >
      Confirmar
    </button>

  </div>

</div>
